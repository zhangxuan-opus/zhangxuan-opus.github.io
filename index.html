<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #08050F;
            font-family: 'Noto Serif SC', 'STSong', serif;
            cursor: default;
            user-select: none;
        }

        /* ── 底图层 ── */
        .cave-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }
        .cave-bg img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* ── 星空 Canvas（覆盖穹顶暗区） ── */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ── 书层 ── */
        .books-layer {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
        }

        /* 单本书的交互区 */
        .book-slot {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        /* 书脊 */
        .book-spine {
            width: 100%;
            height: 100%;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            position: relative;
            overflow: hidden;
            transition: filter 0.3s ease;
        }

        .book-slot:hover .book-spine {
            filter: brightness(1.22) drop-shadow(0 0 14px rgba(200,160,60,0.55));
        }

        .book-slot:hover .book-card {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        .spine-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'ZCOOL XiaoWei', serif;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
        }

        .spine-author {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2px;
            opacity: 0.65;
            position: relative;
            z-index: 2;
        }

        .spine-deco {
            position: absolute;
            font-size: 7px;
            z-index: 2;
        }
        .spine-deco-top    { top: 10px; }
        .spine-deco-bottom { bottom: 10px; }

        /* 悬浮卡片 */
        .book-card {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            width: 152px;
            background: rgba(6, 4, 16, 0.92);
            border: 1px solid rgba(190, 150, 65, 0.30);
            border-radius: 8px;
            padding: 14px 16px 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.26s ease;
            backdrop-filter: blur(14px);
            z-index: 100;
            text-align: center;
            white-space: normal;
        }

        .book-card::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: rgba(190, 150, 65, 0.30);
        }

        .card-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 15px;
            color: rgba(220, 185, 100, 0.98);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-year {
            font-size: 11px;
            color: rgba(160, 140, 100, 0.6);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .card-link {
            display: inline-block;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(200, 165, 80, 0.85);
            border-bottom: 1px solid rgba(200, 165, 80, 0.28);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .card-link:hover {
            color: rgba(230, 200, 120, 1);
            border-color: rgba(230, 200, 120, 0.5);
        }

        /* ─────────────────────────────────────────── */
        /*   地面古典书  — 透视平放，封面朝上            */
        /* ─────────────────────────────────────────── */
        .book-floor {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        .book-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
            transition: filter 0.3s ease, transform 0.3s ease;
            transform-origin: center bottom;
            display: block;
        }

        .book-floor:hover .book-img {
            filter: brightness(1.20) drop-shadow(0 0 20px rgba(190,140,50,0.60));
            transform: scale(1.04);
        }

        .book-floor:hover .book-card-floor {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        /* 地面书的悬浮卡片（弹向上方） */
        .book-card-floor {
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 148px;
            background: rgba(6,4,16,0.93);
            border: 1px solid rgba(190,150,65,0.30);
            border-radius: 8px;
            padding: 14px 16px 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.26s ease;
            backdrop-filter: blur(14px);
            z-index: 100;
            text-align: center;
            white-space: normal;
        }

        .book-card-floor::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: rgba(190,150,65,0.30);
        }

        /* ─────────────────────────────────── */
        /*   《合成之诗》书脊  — 深靛蓝调       */
        /* ─────────────────────────────────── */
        .book-hezhi .book-spine {
            background:
                radial-gradient(circle at 35% 30%, rgba(140,110,240,0.12) 0%, transparent 45%),
                radial-gradient(circle at 65% 70%, rgba(70,90,210,0.10) 0%, transparent 45%),
                linear-gradient(170deg,
                    #0F1E52 0%, #12224E 18%, #0C1840 40%,
                    #0F1E50 60%, #0B1638 78%, #111F4E 100%
                );
            border-left: 2px solid rgba(190, 150, 60, 0.50);
            box-shadow:
                inset 3px 0 10px rgba(150, 110, 35, 0.10),
                inset -1px 0 5px rgba(0, 0, 25, 0.45);
        }

        .book-hezhi .book-spine::before {
            content: '';
            position: absolute;
            inset: 8px 5px;
            border: 1px solid rgba(190, 150, 60, 0.18);
            border-radius: 1px;
        }

        .book-hezhi .spine-title {
            font-size: 13px;
            color: rgba(215, 178, 95, 0.96);
            text-shadow: 0 0 10px rgba(190, 145, 55, 0.50);
        }

        .book-hezhi .spine-author {
            font-size: 9px;
            color: rgba(175, 148, 88, 0.68);
        }

        .book-hezhi .spine-deco {
            color: rgba(190, 155, 65, 0.50);
        }



        /* ── 入场动画 ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .cave-bg     { animation: fadeIn 1.6s ease both; }
        .site-title  { animation: fadeIn 2.0s ease 0.6s both; }
        .books-layer { animation: fadeIn 2.2s ease 1.0s both; }
    </style>
</head>
<body>

<!-- 底图 -->
<div class="cave-bg">
    <img id="cave-img" src="images/cave-bg.png" alt="">
</div>

<!-- 星空 Canvas -->
<canvas id="stars"></canvas>

<!-- 书层 -->
<div class="books-layer">

    <!--
        《合成之诗》
        定位在左侧原木书架第一层
        left / top / width / height 均为视口百分比
        如需微调：修改 style 里的数值即可
    -->
    <!--
        地面古典书——《合成之诗》
        透视平放，封面朝上
        left/top/width/height 均可微调
    -->
    <div class="book-floor" id="book-hezhi">
        <img class="book-img" src="images/book-hezhi.png" alt="合成之诗" />
        <div class="book-card-floor">
            <div class="card-title">《合成之诗》</div>
            <div class="card-year">2025.09</div>
            <a class="card-link" href="novel.html">阅 &nbsp;读</a>
        </div>
    </div>

</div>



<script>
/* ══════════════════════════════════════
   星空生成器
   只在穹顶暗区（大约 x:22-76%, y:0-62%）散布星星
   ══════════════════════════════════════ */
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');

let W, H, stars = [];

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildStars();
}

function buildStars() {
    stars = [];
    // 洞口扁宽弧形，横向覆盖全宽，中心偏上
    const cx = W * 0.53, cy = H * 0.20;
    const rx = W * 0.42, ry = H * 0.28;

    // 边缘亮度渐隐：只控制亮度，不截断位置
    // 从椭圆60%处开始平滑衰减到边缘归零
    function edgeFade(x, y) {
        const dx = (x - cx) / rx;
        const dy = (y - cy) / ry;
        const d  = Math.sqrt(dx * dx + dy * dy);
        const t  = Math.max(0, (d - 0.60) / 0.40);
        return 1 - t * t * (3 - 2 * t); // smoothstep
    }

    // 普通星：sqrt分布=面积均匀，星星能铺到各处
    for (let i = 0; i < 260; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        const x = cx + rx * r * Math.cos(a);
        const y = cy + ry * r * Math.sin(a);
        const fade = edgeFade(x, y);
        if (fade < 0.04) continue;
        stars.push({
            x, y,
            radius: Math.random() * 1.0 + 0.12,
            base:   (Math.random() * 0.55 + 0.30) * fade,
            speed:  Math.random() * 0.005 + 0.002,
            phase:  Math.random() * Math.PI * 2,
            color:  starColor(),
        });
    }

    // 亮星：内70%区域，带光晕
    for (let i = 0; i < 16; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * 0.70;
        const x = cx + rx * r * Math.cos(a);
        const y = cy + ry * r * Math.sin(a);
        const fade = edgeFade(x, y);
        stars.push({
            x, y,
            radius: Math.random() * 1.4 + 1.0,
            base:   (Math.random() * 0.30 + 0.60) * fade,
            speed:  Math.random() * 0.003 + 0.001,
            phase:  Math.random() * Math.PI * 2,
            color:  starColor(),
            bright: true,
        });
    }

    // 红色星——穹顶偏右上
    stars.push({
        x: cx + rx * 0.30,
        y: cy - ry * 0.20,
        radius: 2.0,
        base:   0.90,
        speed:  0.0018,
        phase:  0,
        color:  [255, 65, 40],
        bright: true,
        red:    true,
    });
}

function starColor() {
    const palette = [
        [225,220,255], [255,248,230],
        [205,225,255], [255,232,205], [218,205,255],
    ];
    return palette[Math.floor(Math.random() * palette.length)];
}

function draw(t) {
    ctx.clearRect(0, 0, W, H);

    stars.forEach(s => {
        const tw    = Math.sin(t * s.speed + s.phase) * 0.28 + 0.72;
        const alpha = s.base * tw;
        const [r, g, b] = s.color;

        if (s.bright) {
            const gw = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 5);
            gw.addColorStop(0,   `rgba(${r},${g},${b},${alpha * 0.55})`);
            gw.addColorStop(0.4, `rgba(${r},${g},${b},${alpha * 0.12})`);
            gw.addColorStop(1,   'transparent');
            ctx.fillStyle = gw;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius * 5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);

/* ══════════════════════════════════════
   书本定位：跟随背景图实际渲染位置
   背景图原始尺寸 1536×1024
   cover + center top 模式
   ══════════════════════════════════════ */
const IMG_W = 1536, IMG_H = 1024;

// 书在原图中的位置（百分比）——调这四个数就是调书的位置和大小
const BOOK = { x: 0.26, y: 0.73, w: 0.12, h: 0.15 };

function positionBook() {
    const img = document.getElementById('cave-img');
    const el  = document.getElementById('book-hezhi');
    if (!img || !el) return;

    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.max(vw / IMG_W, vh / IMG_H); // cover: 取大，填满屏幕无黑边
    const rw = IMG_W * scale, rh = IMG_H * scale;
    const ox = (vw - rw) / 2;
    const oy = (vh - rh) / 2;

    el.style.left   = (ox + BOOK.x * rw) + 'px';
    el.style.top    = (oy + BOOK.y * rh) + 'px';
    el.style.width  = (BOOK.w * rw) + 'px';
    el.style.height = (BOOK.h * rh) + 'px';
}

// 图片加载完再定位，避免就算失误
const caveImg = document.getElementById('cave-img');
if (caveImg.complete) positionBook();
else caveImg.addEventListener('load', positionBook);
window.addEventListener('resize', positionBook);
</script>
</body>
</html>
