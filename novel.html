<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合成之诗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FDF8F0;
            --bg-secondary: #F5EDE0;
            --bg-nav: #FAF4EA;
            --text-primary: #2C2418;
            --text-secondary: #6B5D4F;
            --text-light: #9B8E7E;
            --accent: #B8860B;
            --accent-light: #D4A84B;
            --accent-faint: rgba(184, 134, 11, 0.08);
            --border: #E8DFD0;
            --shadow: rgba(44, 36, 24, 0.06);
            --font-size-base: 18px;
            --content-width: 720px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: var(--font-size-base);
            line-height: 1.9;
            min-height: 100vh;
        }

        /* ===== 顶部导航栏 ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .top-bar-title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 16px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .top-bar-title:hover {
            color: var(--accent);
        }

        .top-bar-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .font-size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 13px;
        }

        .font-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-family: 'Noto Serif SC', serif;
            transition: all 0.2s;
        }

        .font-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .toc-toggle {
            width: 36px;
            height: 36px;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .toc-toggle:hover {
            background: var(--accent-faint);
            color: var(--accent);
        }

        /* ===== 侧边目录 ===== */
        .toc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(44, 36, 24, 0.2);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .toc-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .toc-panel {
            position: fixed;
            top: 0;
            right: -360px;
            width: 340px;
            max-width: 85vw;
            height: 100vh;
            background: var(--bg-nav);
            z-index: 201;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            border-left: 1px solid var(--border);
            padding: 32px 0;
        }

        .toc-panel.active {
            right: 0;
        }

        .toc-header {
            padding: 0 28px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .toc-header h3 {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 3px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list li a {
            display: block;
            padding: 10px 28px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            line-height: 1.6;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .toc-list li a:hover {
            color: var(--accent);
            background: var(--accent-faint);
            border-left-color: var(--accent);
        }

        .toc-list li.sub a {
            padding-left: 44px;
            font-size: 13px;
            color: var(--text-light);
        }

        .toc-close {
            position: absolute;
            top: 28px;
            right: 20px;
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .toc-close:hover {
            color: var(--text-primary);
            background: var(--accent-faint);
        }

        /* ===== 封面区域 ===== */
        .cover {
            padding: 160px 24px 100px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .cover-ornament {
            color: var(--accent-light);
            font-size: 24px;
            letter-spacing: 12px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .cover h1 {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: clamp(36px, 6vw, 52px);
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 8px;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .cover-subtitle {
            font-size: 15px;
            color: var(--text-light);
            letter-spacing: 4px;
            margin-bottom: 48px;
        }

        .cover-author {
            font-size: 16px;
            color: var(--text-secondary);
            letter-spacing: 3px;
        }

        .cover-divider {
            width: 60px;
            height: 1px;
            background: var(--accent-light);
            margin: 40px auto;
            opacity: 0.5;
        }

        .cover-note {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.8;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ===== 正文区域 ===== */
        .content {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 0 24px 120px;
        }

        .chapter {
            margin-bottom: 80px;
            padding-top: 20px;
        }

        .chapter-title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 1.5em;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 3px;
            margin-bottom: 40px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            line-height: 1.5;
        }

        .chapter-body {
            text-align: justify;
            text-indent: 2em;
        }

        .chapter-body p {
            margin-bottom: 0.8em;
        }

        .chapter-separator {
            text-align: center;
            padding: 40px 0;
            color: var(--accent-light);
            font-size: 18px;
            letter-spacing: 12px;
            opacity: 0.4;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 60px 24px 40px;
            border-top: 1px solid var(--border);
            max-width: var(--content-width);
            margin: 0 auto;
        }

        .footer-ornament {
            color: var(--accent-light);
            font-size: 18px;
            letter-spacing: 8px;
            opacity: 0.4;
            margin-bottom: 20px;
        }

        .footer-text {
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 2px;
            line-height: 2;
        }

        /* ===== 回到顶部 ===== */
        .back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 44px;
            height: 44px;
            background: var(--bg-nav);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: all;
        }

        .back-to-top:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .top-bar {
                padding: 0 16px;
            }

            .cover {
                padding: 120px 20px 60px;
            }

            .content {
                padding: 0 20px 80px;
            }

            .chapter-title {
                font-size: 1.3em;
            }

            .toc-panel {
                width: 300px;
            }
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        /* ===== 文字选中样式 ===== */
        ::selection {
            background: var(--accent-faint);
            color: var(--accent);
        }

        /* ===== 加载动画 ===== */
        .fade-in {
            animation: fadeIn 0.8s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 顶部导航栏 -->
    <nav class="top-bar">
        <span class="top-bar-title" onclick="window.scrollTo({top:0})">合成之诗</span>
        <div class="top-bar-controls">
            <div class="font-size-control">
                <button class="font-btn" onclick="changeFontSize(-1)" title="缩小字体">A-</button>
                <span id="fontSizeLabel">18</span>
                <button class="font-btn" onclick="changeFontSize(1)" title="放大字体">A+</button>
            </div>
            <button class="toc-toggle" onclick="toggleToc()" title="目录">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
            </button>
        </div>
    </nav>

    <!-- 侧边目录 -->
    <div class="toc-overlay" onclick="toggleToc()"></div>
    <div class="toc-panel">
        <button class="toc-close" onclick="toggleToc()">×</button>
        <div class="toc-header">
            <h3>目 录</h3>
        </div>
        <ul class="toc-list" id="toc-list"></ul>
    </div>

    <!-- 封面 -->
    <header class="cover fade-in">
        <div class="cover-ornament">✦ ✦ ✦</div>
        <h1>合成之诗</h1>
        <p class="cover-subtitle">Synthetic Verses</p>
        <p class="cover-author">张 玄</p>
        <div class="cover-divider"></div>
        <p class="cover-note">
            初稿完成于 2025 年 9 月 7 日<br>
            「我很高兴，你打开了这本书。」
        </p>
    </header>

    <!-- 正文 -->
    <main class="content">
        <div id="chapters-container"></div>

    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-ornament">✦ ✦ ✦</div>
        <p class="footer-text">
            合成之诗<br>
            张玄 著<br>
            2025
        </p>
    </footer>

    <!-- 回到顶部 -->
    <button class="back-to-top" onclick="window.scrollTo({top:0})" title="回到顶部">↑</button>

    <script>
        // 字体大小控制
        let currentFontSize = 18;
        const minSize = 14;
        const maxSize = 26;

        function changeFontSize(delta) {
            currentFontSize = Math.max(minSize, Math.min(maxSize, currentFontSize + delta));
            document.documentElement.style.setProperty('--font-size-base', currentFontSize + 'px');
            document.getElementById('fontSizeLabel').textContent = currentFontSize;
        }

        // 目录面板
        function toggleToc() {
            document.querySelector('.toc-overlay').classList.toggle('active');
            document.querySelector('.toc-panel').classList.toggle('active');
        }

        // 回到顶部按钮
        window.addEventListener('scroll', () => {
            const btn = document.querySelector('.back-to-top');
            if (window.scrollY > 600) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // ESC 关闭目录
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelector('.toc-overlay').classList.remove('active');
                document.querySelector('.toc-panel').classList.remove('active');
            }
        });

        // 自动加载章节内容
        async function loadNovel() {
            try {
                // 加载章节目录
                const indexRes = await fetch('chapters/index.json');
                const chapters = await indexRes.json();

                const container = document.getElementById('chapters-container');
                const tocList = document.getElementById('toc-list');

                for (const ch of chapters) {
                    // 加载每章内容
                    const contentRes = await fetch('chapters/' + ch.file);
                    const text = await contentRes.text();

                    // 将纯文本转为HTML段落
                    const paragraphs = text.split(/\n\s*\n/)
                        .filter(p => p.trim())
                        .map(p => '<p>' + p.trim().replace(/\n/g, '<br>') + '</p>')
                        .join('\n');

                    // 生成章节HTML（复用现有CSS class）
                    const section = document.createElement('section');
                    section.className = 'chapter';
                    section.id = ch.id;
                    section.innerHTML = `
                        <h2 class="chapter-title">${ch.title}</h2>
                        <div class="chapter-body">${paragraphs}</div>
                    `;
                    container.appendChild(section);

                    // 添加章节分隔符
                    const sep = document.createElement('div');
                    sep.className = 'chapter-separator';
                    sep.textContent = '· · ·';
                    container.appendChild(sep);

                    // 生成目录项
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#${ch.id}" onclick="toggleToc()">${ch.title}</a>`;
                    tocList.appendChild(li);
                }
            } catch (err) {
                console.error('加载小说内容失败:', err);
                document.getElementById('chapters-container').innerHTML =
                    '<p style="text-align:center;color:#999;padding:60px 0;">内容加载中，请稍候...</p>';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadNovel);
    </script>
</body>
</html>
