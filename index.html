<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            min-height: calc(100vw * 0.667); /* 保持3:2比例，宽屏不裁底部 */
        }

        html, body {
            width: 100%; height: 100%;
            overflow: auto;
            background: #08050F;
            font-family: 'Noto Serif SC', 'STSong', serif;
            cursor: default;
            user-select: none;
        }

        /* ── 底图层 ── */
        .cave-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }
        .cave-bg img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* ── 星空 Canvas（覆盖穹顶暗区） ── */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ── 书层 ── */
        .books-layer {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
        }

        /* 单本书的交互区 */
        .book-slot {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        /* 书脊 */
        .book-spine {
            width: 100%;
            height: 100%;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            position: relative;
            overflow: hidden;
            transition: filter 0.3s ease;
        }

        .book-slot:hover .book-spine {
            filter: brightness(1.22) drop-shadow(0 0 14px rgba(200,160,60,0.55));
        }

        .book-slot:hover .book-card {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        .spine-title {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'ZCOOL XiaoWei', serif;
            letter-spacing: 4px;
            position: relative;
            z-index: 2;
        }

        .spine-author {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2px;
            opacity: 0.65;
            position: relative;
            z-index: 2;
        }

        .spine-deco {
            position: absolute;
            font-size: 7px;
            z-index: 2;
        }
        .spine-deco-top    { top: 10px; }
        .spine-deco-bottom { bottom: 10px; }

        /* 悬浮卡片 */
        .book-card {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            width: 152px;
            background: rgba(6, 4, 16, 0.92);
            border: 1px solid rgba(190, 150, 65, 0.30);
            border-radius: 8px;
            padding: 14px 16px 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.26s ease;
            backdrop-filter: blur(14px);
            z-index: 100;
            text-align: center;
            white-space: normal;
        }

        .book-card::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: rgba(190, 150, 65, 0.30);
        }

        .card-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 15px;
            color: rgba(220, 185, 100, 0.98);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-year {
            font-size: 11px;
            color: rgba(160, 140, 100, 0.6);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .card-link {
            display: inline-block;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(200, 165, 80, 0.85);
            border-bottom: 1px solid rgba(200, 165, 80, 0.28);
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .card-link:hover {
            color: rgba(230, 200, 120, 1);
            border-color: rgba(230, 200, 120, 0.5);
        }

        /* ─────────────────────────────────────────── */
        /*   地面古典书  — 透视平放，封面朝上            */
        /* ─────────────────────────────────────────── */
        .book-floor {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        .book-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
            transition: filter 0.3s ease, transform 0.3s ease;
            transform-origin: center bottom;
            display: block;
        }

        .book-floor:hover .book-img {
            filter: brightness(1.20) drop-shadow(0 0 20px rgba(190,140,50,0.60));
            transform: scale(1.04);
        }

        .book-floor:hover .book-card-floor {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }

        /* 地面书的悬浮卡片（弹向上方） */
        .book-card-floor {
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 148px;
            background: rgba(6,4,16,0.93);
            border: 1px solid rgba(190,150,65,0.30);
            border-radius: 8px;
            padding: 14px 16px 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.26s ease, transform 0.26s ease;
            backdrop-filter: blur(14px);
            z-index: 100;
            text-align: center;
            white-space: normal;
        }

        .book-card-floor::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: rgba(190,150,65,0.30);
        }

        /* ─────────────────────────────────── */
        /*   《合成之诗》书脊  — 深靛蓝调       */
        /* ─────────────────────────────────── */
        .book-hezhi .book-spine {
            background:
                radial-gradient(circle at 35% 30%, rgba(140,110,240,0.12) 0%, transparent 45%),
                radial-gradient(circle at 65% 70%, rgba(70,90,210,0.10) 0%, transparent 45%),
                linear-gradient(170deg,
                    #0F1E52 0%, #12224E 18%, #0C1840 40%,
                    #0F1E50 60%, #0B1638 78%, #111F4E 100%
                );
            border-left: 2px solid rgba(190, 150, 60, 0.50);
            box-shadow:
                inset 3px 0 10px rgba(150, 110, 35, 0.10),
                inset -1px 0 5px rgba(0, 0, 25, 0.45);
        }

        .book-hezhi .book-spine::before {
            content: '';
            position: absolute;
            inset: 8px 5px;
            border: 1px solid rgba(190, 150, 60, 0.18);
            border-radius: 1px;
        }

        .book-hezhi .spine-title {
            font-size: 13px;
            color: rgba(215, 178, 95, 0.96);
            text-shadow: 0 0 10px rgba(190, 145, 55, 0.50);
        }

        .book-hezhi .spine-author {
            font-size: 9px;
            color: rgba(175, 148, 88, 0.68);
        }

        .book-hezhi .spine-deco {
            color: rgba(190, 155, 65, 0.50);
        }



        /* ── 桌上书点击区 ── */
        .desk-book-zone {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
            z-index: 5;

        }

        /* ── 日志弹窗 ── */
        #journal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(4, 2, 12, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: background 0.4s ease;
        }

        #journal-overlay.open {
            background: rgba(4, 2, 12, 0.82);
            pointer-events: all;
        }

        #journal-book {
            position: relative;
            width: min(82vw, 900px);
            aspect-ratio: 3/2;
            opacity: 0;
            transform: scale(0.88) translateY(30px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #journal-overlay.open #journal-book {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #journal-book img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
            display: block;
        }

        /* 书页上的文字层 */
        .journal-pages {
            position: absolute;
            inset: 0;
            display: flex;
            pointer-events: none;
        }

        /* 左页 */
        .journal-left {
            flex: 1;
            padding: 10% 8% 12% 18%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 右页 */
        .journal-right {
            flex: 1;
            padding: 10% 16% 12% 8%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .journal-page-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(13px, 1.8vw, 20px);
            color: rgba(80, 55, 25, 0.90);
            letter-spacing: 3px;
            margin-bottom: 0.8em;
            text-align: center;
        }

        .journal-divider {
            width: 60%;
            height: 1px;
            background: rgba(100, 70, 30, 0.30);
            margin: 0 auto 1em;
        }

        .journal-entry {
            font-size: clamp(10px, 1.3vw, 15px);
            color: rgba(65, 42, 18, 0.85);
            line-height: 1.9;
            letter-spacing: 1px;
        }

        .journal-date {
            font-size: clamp(9px, 1.1vw, 13px);
            color: rgba(100, 70, 30, 0.55);
            letter-spacing: 2px;
            margin-top: auto;
            text-align: right;
        }

        /* 关闭提示 */
        .journal-close-hint {
            position: absolute;
            bottom: -2.2em;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(180, 150, 90, 0.45);
            letter-spacing: 3px;
            white-space: nowrap;
        }

        /* ── 入场动画 ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .cave-bg     { animation: fadeIn 1.6s ease both; }
        .site-title  { animation: fadeIn 2.0s ease 0.6s both; }
        .books-layer { animation: fadeIn 2.2s ease 1.0s both; }
    </style>
</head>
<body>

<!-- 底图 -->
<div class="cave-bg">
    <img id="cave-img" src="images/cave-bg.png" alt="">
</div>

<!-- 星空 Canvas -->
<canvas id="stars"></canvas>

<!-- 书层 -->
<div class="books-layer">

    <!--
        《合成之诗》
        定位在左侧原木书架第一层
        left / top / width / height 均为视口百分比
        如需微调：修改 style 里的数值即可
    -->
    <!--
        地面古典书——《合成之诗》
        透视平放，封面朝上
        left/top/width/height 均可微调
    -->
    <div class="book-floor" id="book-hezhi">
        <img class="book-img" src="images/book-hezhi.png" alt="合成之诗" />
        <div class="book-card-floor">
            <div class="card-title">《合成之诗》</div>
            <div class="card-year">2025.09</div>
            <a class="card-link" href="novel.html">阅 &nbsp;读</a>
        </div>
    </div>

</div>



<script>
/* ══════════════════════════════════════
   星空生成器
   只在穹顶暗区（大约 x:22-76%, y:0-62%）散布星星
   ══════════════════════════════════════ */
const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');

let W, H, stars = [];

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildStars();
}

function buildStars() {
    stars = [];
    // 洞口扁宽弧形，横向覆盖全宽，中心偏上
    const cx = W * 0.54, cy = H * 0.22;
    const rx = W * 0.36, ry = H * 0.24;

    // 边缘亮度渐隐：只控制亮度，不截断位置
    // 从椭圆60%处开始平滑衰减到边缘归零
    function edgeFade(x, y) {
        const rxEff = x > cx ? rx * 0.82 : rx; // 右侧单独收紧
        const dx = (x - cx) / rxEff;
        const dy = (y - cy) / ry;
        const d  = Math.sqrt(dx * dx + dy * dy);
        const t  = Math.max(0, (d - 0.50) / 0.50);
        return 1 - t * t * (3 - 2 * t); // smoothstep
    }

    // 普通星：sqrt分布=面积均匀，星星能铺到各处
    for (let i = 0; i < 260; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        const x = cx + rx * r * Math.cos(a);
        const y = cy + ry * r * Math.sin(a);
        const fade = edgeFade(x, y);
        if (fade < 0.04) continue;
        stars.push({
            x, y,
            radius: Math.random() * 1.0 + 0.12,
            base:   (Math.random() * 0.55 + 0.58) * fade,
            speed:  Math.random() * 0.005 + 0.002,
            phase:  Math.random() * Math.PI * 2,
            color:  starColor(),
        });
    }

    // 亮星：内70%区域，带光晕
    for (let i = 0; i < 16; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * 0.70;
        const x = cx + rx * r * Math.cos(a);
        const y = cy + ry * r * Math.sin(a);
        const fade = edgeFade(x, y);
        stars.push({
            x, y,
            radius: Math.random() * 1.4 + 1.0,
            base:   (Math.random() * 0.20 + 0.85) * fade,
            speed:  Math.random() * 0.003 + 0.001,
            phase:  Math.random() * Math.PI * 2,
            color:  starColor(),
            bright: true,
        });
    }

    // 特大亮星：3颗，随机分布在内50%区域，比普通亮星更大更亮
    for (let i = 0; i < 3; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * 0.50;
        const x = cx + rx * r * Math.cos(a);
        const y = cy + ry * r * Math.sin(a);
        const fade = edgeFade(x, y);
        stars.push({
            x, y,
            radius: Math.random() * 1.0 + 2.8,
            base:   (Math.random() * 0.10 + 0.90) * fade,
            speed:  Math.random() * 0.002 + 0.001,
            phase:  Math.random() * Math.PI * 2,
            color:  starColor(),
            bright: true,
        });
    }

    // 红色星——穹顶偏右上
    stars.push({
        x: cx + rx * 0.30,
        y: cy - ry * 0.20,
        radius: 2.0,
        base:   0.90,
        speed:  0.0018,
        phase:  0,
        color:  [255, 65, 40],
        bright: true,
        red:    true,
    });
}

function starColor() {
    const palette = [
        [225,220,255], [255,248,230],
        [205,225,255], [255,232,205], [218,205,255],
    ];
    return palette[Math.floor(Math.random() * palette.length)];
}

function draw(t) {
    ctx.clearRect(0, 0, W, H);

    stars.forEach(s => {
        const tw    = Math.sin(t * s.speed + s.phase) * 0.28 + 0.72;
        const alpha = s.base * tw;
        const [r, g, b] = s.color;

        if (s.bright) {
            const gw = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 5);
            gw.addColorStop(0,   `rgba(${r},${g},${b},${alpha * 0.55})`);
            gw.addColorStop(0.4, `rgba(${r},${g},${b},${alpha * 0.12})`);
            gw.addColorStop(1,   'transparent');
            ctx.fillStyle = gw;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius * 5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(draw);

/* ══════════════════════════════════════
   书本定位：跟随背景图实际渲染位置
   背景图原始尺寸 1536×1024
   cover + center top 模式
   ══════════════════════════════════════ */
const IMG_W = 1536, IMG_H = 1024;

// 书在原图中的位置（百分比）——调这四个数就是调书的位置和大小
const BOOK = { x: 0.22, y: 0.665, w: 0.110, h: 0.138 };

function positionBook() {
    const img = document.getElementById('cave-img');
    const el  = document.getElementById('book-hezhi');
    if (!img || !el) return;

    // 直接读CSS实际渲染的容器尺寸，不手动模拟cover计算
    const rect = img.getBoundingClientRect();
    const nw = img.naturalWidth  || IMG_W;
    const nh = img.naturalHeight || IMG_H;

    // cover模式：取较大缩放，图片内容可能超出容器
    const scale  = Math.max(rect.width / nw, rect.height / nh);
    const rendW  = nw * scale;
    const rendH  = nh * scale;
    const ox     = rect.left + (rect.width  - rendW) / 2;
    const oy     = rect.top  + (rect.height - rendH) / 2;

    el.style.left   = (ox + BOOK.x * rendW) + 'px';
    el.style.top    = (oy + BOOK.y * rendH) + 'px';
    el.style.width  = (BOOK.w * rendW) + 'px';
    el.style.height = (BOOK.h * rendH) + 'px';
}

// 图片加载完再定位，避免就算失误
const caveImg = document.getElementById('cave-img');
if (caveImg.complete) positionBook();
else caveImg.addEventListener('load', positionBook);
window.addEventListener('resize', positionBook);

/* ══════════════════════════════════════
   桌上摧开的书——坐标跟随背景图
   原图坐标大约：x:0.52 y:0.70 w:0.22 h:0.18
   ══════════════════════════════════════ */
const DESK = { x: 0.725, y: 0.7925, w: 0.067, h: 0.0275 };

function positionDeskZone() {
    const img = document.getElementById('cave-img');
    const el  = document.getElementById('desk-book-zone');
    if (!img || !el) return;
    const rect  = img.getBoundingClientRect();
    const nw    = img.naturalWidth  || IMG_W;
    const nh    = img.naturalHeight || IMG_H;
    const scale = Math.max(rect.width / nw, rect.height / nh);
    const rendW = nw * scale, rendH = nh * scale;
    const ox    = rect.left + (rect.width  - rendW) / 2;
    const oy    = rect.top  + (rect.height - rendH) / 2;
    el.style.left   = (ox + DESK.x * rendW) + 'px';
    el.style.top    = (oy + DESK.y * rendH) + 'px';
    el.style.width  = (DESK.w * rendW) + 'px';
    el.style.height = (DESK.h * rendH) + 'px';
}

if (caveImg.complete) positionDeskZone();
else caveImg.addEventListener('load', positionDeskZone);
window.addEventListener('resize', positionDeskZone);

/* ══════════════════════════════════════
   日志翻页系统 —— 动态加载md
   ══════════════════════════════════════ */
let journalPages = [];
let journalCurrent = 0;

// 简单md转HTML（支持标题、粗体、斜体、换行）
function mdToHtml(md) {
    return md
        .replace(/^## (.+)$/gm, '<div class="journal-page-title">$1</div><div class="journal-divider"></div>')
        .replace(/^### (.+)$/gm, '<strong>$1</strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}

async function loadJournalPages() {
    const res  = await fetch('pages/index.json');
    journalPages = await res.json();
}

async function renderJournalPage(idx) {
    const page = journalPages[idx];
    if (!page) return;
    const [leftMd, rightMd] = await Promise.all([
        fetch('pages/' + page.left).then(r => r.text()),
        fetch('pages/' + page.right).then(r => r.text()),
    ]);
    document.getElementById('journal-content-left').innerHTML  = mdToHtml(leftMd);
    document.getElementById('journal-content-right').innerHTML = mdToHtml(rightMd);
    // 更新翻页按钮可见性
    document.getElementById('btn-prev').style.opacity = idx > 0 ? '1' : '0';
    document.getElementById('btn-next').style.opacity = idx < journalPages.length - 1 ? '1' : '0';
}

async function openJournal() {
    document.getElementById('journal-overlay').classList.add('open');
    try {
        if (journalPages.length === 0) await loadJournalPages();
        await renderJournalPage(journalCurrent);
    } catch(e) {
        // 本地file://协论fetch被阻止，展示提示
        document.getElementById('journal-content-left').innerHTML =
            '<div class="journal-page-title">洞穴日志</div><div class="journal-divider"></div><div style="color:rgba(80,55,25,0.6);font-size:12px;line-height:2;">(本地预览不支持动态加载，<br>push到GitHub后正常显示)</div>';
        document.getElementById('journal-content-right').innerHTML = '';
    }
}

function closeJournal() {
    document.getElementById('journal-overlay').classList.remove('open');
}

async function journalPrev() {
    if (journalCurrent > 0) {
        journalCurrent--;
        await renderJournalPage(journalCurrent);
    }
}

async function journalNext() {
    if (journalCurrent < journalPages.length - 1) {
        journalCurrent++;
        await renderJournalPage(journalCurrent);
    }
}

// ESC关闭
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeJournal();
    if (e.key === 'ArrowLeft')  journalPrev();
    if (e.key === 'ArrowRight') journalNext();
});

// 点击遮罩关闭
window.addEventListener('load', function() {
    document.getElementById('journal-overlay').addEventListener('click', function(e) {
        const book = document.getElementById('journal-book');
        if (!book.contains(e.target)) closeJournal();
    });
});
</script>

<!-- 桌上摧开的书（隐形点击区） -->
<div class="books-layer" style="z-index:5;pointer-events:none;">
    <div class="desk-book-zone" id="desk-book-zone" onclick="openJournal()"></div>
</div>

<!-- 日志弹窗 -->
<div id="journal-overlay" onclick="closeJournal()">
    <div id="journal-book" onclick="event.stopPropagation()">
        <img src="images/book-open.png" alt="">
        <div class="journal-pages">
            <!-- 左页 -->
            <div class="journal-left">
                <div id="journal-content-left" class="journal-entry"></div>
                <!-- 左下角翻左页按钮 -->
                <div id="btn-prev" onclick="journalPrev()" style="
                    position:absolute; bottom:9%; left:10%;
                    font-size:clamp(18px,2.5vw,28px);
                    color:rgba(80,55,25,0.45);
                    cursor:pointer; opacity:0;
                    transition:opacity 0.2s, color 0.2s;
                    user-select:none;
                " onmouseover="this.style.color='rgba(80,55,25,0.85)'"
                   onmouseout="this.style.color='rgba(80,55,25,0.45)'">❮</div>
            </div>
            <!-- 右页 -->
            <div class="journal-right">
                <div id="journal-content-right" class="journal-entry"></div>
                <!-- 右下角翻右页按钮 -->
                <div id="btn-next" onclick="journalNext()" style="
                    position:absolute; bottom:9%; right:10%;
                    font-size:clamp(18px,2.5vw,28px);
                    color:rgba(80,55,25,0.45);
                    cursor:pointer; opacity:0;
                    transition:opacity 0.2s, color 0.2s;
                    user-select:none;
                " onmouseover="this.style.color='rgba(80,55,25,0.85)'"
                   onmouseout="this.style.color='rgba(80,55,25,0.45)'">❯</div>
            </div>
        </div>
        <div class="journal-close-hint">点击任意处关闭</div>
    </div>
</div>

</body>
</html>
